name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (typecheck + tests + build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: notevault
          POSTGRES_PASSWORD: notevault
          POSTGRES_DB: notevault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U notevault"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://notevault:notevault@localhost:5432/notevault_test
      JWT_SECRET: ci-only-secret-padding-padding-1234
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Install db migration deps
        run: cd ../db && npm install --no-audit --no-fund
      - name: Apply migrations
        run: cd ../db && DATABASE_URL="$DATABASE_URL" node migrate.mjs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
